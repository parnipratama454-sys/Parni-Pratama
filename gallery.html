<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Project - Gallery</title>
    <style>
        /* CSS DASAR (Konsisten dengan halaman sebelumnya) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a0000;
            color: #ffffff;
            line-height: 1.6;
        }

        nav {
            background-color: #8B0000;
            padding: 1rem;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff4d4d;
        }

        /* GALLERY STYLE */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        .container h2 {
            font-size: 2.5rem;
            color: #ff0000;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Grid System untuk 4 Foto */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            border: 3px solid #8B0000;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 1 / 1; /* Membuat foto kotak sempurna */
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        /* Efek Hover */
        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.4);
            border-color: #ff0000;
        }

        .gallery-item:hover img {
            transform: scale(1.1); /* Zoom masuk saat hover */
        }

        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 40px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="biodata.html">BIODATA</a>
        <a href="gallery.html">GALLERY</a>
        <a href="video.html">VIDEO</a>
    </nav>

    <div class="container">
        <h2>Red Collection</h2>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="samping kanan kos.jpeg" alt="Foto 1">
            </div>
            <div class="gallery-item">
                <img src="Samping Kiri.jpeg" alt="Foto 2">
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/red3/500/500" alt="Foto 3">
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/red4/500/500" alt="Foto 4">
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 - Tugas Web Design [Nama Kamu]
    </footer>

</body>
</html>
