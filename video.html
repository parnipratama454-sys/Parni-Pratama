<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video - Tema Merah</title>
    <style>
        /* CSS Terintegrasi */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigasi */
        nav {
            background-color: #b30000; /* Merah Gelap */
            padding: 1rem;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: #ffcccc;
        }

        /* Header */
        header {
            background-color: #e60000; /* Merah Terang */
            color: white;
            padding: 2rem;
            text-align: center;
        }

        /* Konten Utama */
        .container {
            padding: 20px;
            max-width: 900px;
            margin: 20px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #b30000;
            border-bottom: 3px solid #e60000;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        /* Wrapper Video agar Responsif */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Rasio 16:9 */
            height: 0;
            overflow: hidden;
            border: 5px solid #e60000; /* Bingkai Merah */
            border-radius: 8px;
            background-color: #000;
        }

        .video-wrapper iframe, 
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery.html">Gallery</a>
        <a href="video.html">Video</a>
    </nav>

    <header>
        <h1>Koleksi Video</h1>
    </header>

    <section class="container">
        <h2>Video Utama</h2>
        
        <div class="video-wrapper">
            <iframe 
                src="video.mp4" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>

            </div>

        <p style="margin-top: 15px; font-style: italic;">
            Deskripsi: Video pendek yang menunjukkan suasan dikost saya.
        </p>
    </section>

    <footer>
        &copy; 2026 - Website Design Parni Pratama
    </footer>

</body>
</html>
