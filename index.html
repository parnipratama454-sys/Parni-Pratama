<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendataan Terintegrasi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #333; margin-top: 30px; }
        h2:first-child { margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="text"], input[type="date"], input[type="email"], input[type="tel"], input[type="number"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Styling untuk Radio Button agar terlihat seperti Button biasa */
        .radio-group { display: flex; gap: 10px; }
        .radio-group input[type="radio"] { display: none; }
        .radio-group label { flex: 1; text-align: center; padding: 10px; border: 1px solid #007bff; border-radius: 4px; cursor: pointer; color: #007bff; transition: 0.3s; }
        .radio-group input[type="radio"]:checked + label { background-color: #007bff; color: white; }

        .submit-btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .submit-btn:hover { background: #218838; }
        #loading, #success-msg { display: none; text-align: center; margin-top: 15px; font-weight: bold; }
        #success-msg { color: green; }
    </style>
</head>
<body>

<div class="container">
    <form name="submit-to-google-sheet">
        <h2>1. Data Demografi</h2>
        <div class="form-group">
            <label>Nama Pengguna</label>
            <input type="text" name="nama" required>
        </div>
        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" name="tanggalLahir" required>
        </div>
        <div class="form-group">
            <label>Alamat</label>
            <textarea name="alamat" rows="3" required></textarea>
        </div>
        <div class="form-group">
            <label>No Telepon</label>
            <input type="tel" name="telepon" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Pendidikan (Ketik untuk mencari atau pilih)</label>
            <input list="pendidikan-list" name="pendidikan" required>
            <datalist id="pendidikan-list">
                <option value="SD / Sederajat">
                <option value="SMP / Sederajat">
                <option value="SMA / SMK / Sederajat">
                <option value="D3 - Diploma">
                <option value="S1 - Sarjana">
                <option value="S2 - Magister">
                <option value="S3 - Doktor">
            </datalist>
        </div>

        <h2>2. Data Bank</h2>
        <div class="form-group">
            <label>Nama Bank</label>
            <input list="bank-list" name="bank" required>
            <datalist id="bank-list">
                <option value="Bank Mandiri">
                <option value="Bank Rakyat Indonesia (BRI)">
                <option value="Bank Central Asia (BCA)">
                <option value="Bank Negara Indonesia (BNI)">
                <option value="Bank Syariah Indonesia (BSI)">
                <option value="Bank CIMB Niaga">
                <option value="Bank Jago">
                <option value="SeaBank">
            </datalist>
        </div>
        <div class="form-group">
            <label>Nomor Rekening</label>
            <input type="number" name="rekening" required>
        </div>

        <h2>3. Data Transaksi Keuangan</h2>
        <div class="form-group">
            <label>Tanggal Transaksi</label>
            <input type="date" name="tanggalTransaksi" required>
        </div>
        <div class="form-group">
            <label>Uraian Transaksi</label>
            <input type="text" name="uraian" placeholder="Contoh: Gaji bulan ini, Beli makan siang..." required>
        </div>
        
        <div class="form-group">
            <label>Jenis Transaksi</label>
            <div class="radio-group">
                <input type="radio" id="btn-pemasukan" name="jenisTransaksi" value="Pemasukan" required>
                <label for="btn-pemasukan">Pemasukan</label>
                
                <input type="radio" id="btn-pengeluaran" name="jenisTransaksi" value="Pengeluaran">
                <label for="btn-pengeluaran">Pengeluaran</label>
            </div>
        </div>

        <div class="form-group">
            <label>Debet (Rp)</label>
            <input type="number" name="debit" placeholder="Isi 0 jika tidak ada">
        </div>
        <div class="form-group">
            <label>Kredit (Rp)</label>
            <input type="number" name="kredit" placeholder="Isi 0 jika tidak ada">
        </div>

        <button type="submit" class="submit-btn" id="btn-kirim">Kirim Data</button>
        <p id="loading">Mengirim data, mohon tunggu...</p>
        <p id="success-msg">Data berhasil dikirim ke sistem!</p>
    </form>
</div>

<script>
    // GANTI URL DI BAWAH DENGAN URL WEB APP GOOGLE SCRIPT ANDA
    const scriptURL = 'URL_APPS_SCRIPT_ANDA_DI_SINI'; 
    const form = document.forms['submit-to-google-sheet'];
    const btnKirim = document.getElementById('btn-kirim');
    const loading = document.getElementById('loading');
    const successMsg = document.getElementById('success-msg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Tampilkan loading, sembunyikan tombol
        btnKirim.style.display = 'none';
        loading.style.display = 'block';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                loading.style.display = 'none';
                successMsg.style.display = 'block';
                form.reset(); // Kosongkan form setelah sukses
                
                // Kembalikan form seperti semula setelah 3 detik
                setTimeout(() => {
                    successMsg.style.display = 'none';
                    btnKirim.style.display = 'block';
                }, 3000);
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("Terjadi kesalahan, gagal mengirim data.");
                loading.style.display = 'none';
                btnKirim.style.display = 'block';
            });
    });
</script>

</body>
</html>
